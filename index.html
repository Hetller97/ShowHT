    function renderPlayers(players) {
  const searchValue = document.getElementById("searchInput").value.trim().toLowerCase();
  playersContainer.innerHTML = "";

  Object.values(players).forEach((p) => {

    const username = p.username || "بدون اسم";
    const number = p.number || 0;
    const status = p.status || "";
    const points = p.points || 0;
    const profileLink = p.profileLink || "#";

    const equipmentText = p.equipment
      ? Object.values(p.equipment).join(", ")
      : "لا معدات";

    if (
      searchValue &&
      !username.toLowerCase().includes(searchValue) &&
      !String(number).includes(searchValue)
    ) {
      return;
    }

    const card = document.createElement("div");
    card.className = "card";

    if (status === "مقصي") {
      card.classList.add("red");
    }

    card.innerHTML = `
      <h2>${username} (#${number})</h2>
      <p>رابط الحساب: <a href="${profileLink}" target="_blank">فتح الحساب</a></p>
      <p>الحالة: ${status}</p>
      <p>النقاط: ${points}</p>
      <p>المعدات: ${equipmentText}</p>
    `;

    playersContainer.appendChild(card);
  });
    }
